name: 'Shopping Cart'
regions:
  - name: main
    blocks:
      - type: card
        name: cartContent
        fields:
          - name: checkoutBtn
            locator:
              type: getByRole
              value: "link, { name: 'Proceed To Checkout' }"
          - name: registerLoginBtn
            locator:
              type: getByRole
              value: "link, { name: 'Register / Login' }"
          - name: emptyCartLink
            locator:
              type: getByRole
              value: "link, { name: 'here' }"
          - name: cartTable
            locator:
              type: getByRole
              value: 'table'
          - name: deleteItem
            locator:
              type: getByRole
              value: "link, { name: 'Delete' }"
  - name: footer
    blocks:
      - type: form
        name: subscription
        title:
          type: getByRole
          value: "heading, { name: 'Subscription' }"
        fields:
          - name: emailInput
            locator:
              type: getByPlaceholder
              value: 'Your email address'
          - name: subscribeBtn
            locator:
              type: getByRole
              value: "button, { name: '' }"
