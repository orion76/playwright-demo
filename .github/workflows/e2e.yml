name: E2E Tests + Allure Report

on:
  push:
    branches:
      - deploy-report

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci

      - run: npx playwright install chromium

      - name: Create auth dir
        run: mkdir -p auth

      - name: Restore auth state
        run: |
          if [ -n "${{ secrets.AUTH_STATE }}" ]; then
            echo "${{ secrets.AUTH_STATE }}" | base64 -d > auth/persistent-user.json
          fi
        continue-on-error: true

      - name: Run tests
        run: npx playwright test --workers 2 --timeout 120000
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://automationexercise.com' }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          name: github-pages
          path: allure-report/

  deploy:
    if: success() || failure()
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
