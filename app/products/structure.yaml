name: 'All Products'
regions:
  - name: sidebar
    blocks:
      - type: menu
        name: brands
        title:
          type: getByRole
          value: "heading, { name: 'Brands' }"
  - name: main
    blocks:
      - type: form
        name: search
        fields:
          - name: searchInput
            locator:
              type: getByPlaceholder
              value: 'Search Product'
          - name: searchBtn
            locator:
              type: getByRole
              value: "button, { name: '' }"
      - type: card
        name: productList
        title:
          type: getByRole
          value: "heading, { name: 'All Products' }"
        fields:
          - name: categoryTitle
            locator:
              type: getByRole
              value: 'heading'
          - name: addToCartBtn
            locator:
              type: getByRole
              value: "link, { name: 'Add to cart' }"
          - name: continueShopping
            locator:
              type: getByRole
              value: "button, { name: 'Continue Shopping' }"
          - name: viewCartInModal
            locator:
              type: getByRole
              value: "link, { name: 'View Cart' }"
