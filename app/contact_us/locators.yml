main:
  contactForm:
    title:
      by: role
      role: heading
    nameInput:
      by: css
      selector: "#contact-us-form input[placeholder='Name']"
    emailInput:
      by: css
      selector: "#contact-us-form input[placeholder='Email']"
    subjectInput:
      by: css
      selector: "#contact-us-form input[placeholder='Subject']"
    messageInput:
      by: css
      selector: "#contact-us-form textarea[placeholder='Your Message Here']"
    fileInput:
      by: css
      selector: "input[type='file']"
    submitBtn:
      by: css
      selector: "#contact-us-form input[type='submit']"
    successMsg:
      by: css
      selector: '.status.alert-success'
    homeLink:
      by: css
      selector: 'a.btn.btn-success'
