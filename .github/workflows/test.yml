name: E2E Tests

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci

      - run: npx playwright install chromium

      - name: Create auth dir
        run: mkdir -p auth

      - name: Restore auth state
        run: |
          if [ -n "${{ secrets.AUTH_STATE }}" ]; then
            echo "${{ secrets.AUTH_STATE }}" > auth/persistent-user.json
          fi
        continue-on-error: true

      - name: Run tests
        run: npx playwright test --project=desktop --workers 1 --timeout 120000
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://automationexercise.com' }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
